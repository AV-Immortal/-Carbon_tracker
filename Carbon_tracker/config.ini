# 低碳行为追踪系统 - 配置文件
# 
# 你可以修改以下碳排放系数来适应你的实际情况
# 注意：修改系数后需要重启程序才能生效

[emission_factors]
# 用电碳排放系数 (kg CO2/kWh)
# 不同地区的电力结构不同，系数会有差异
electricity = 0.581

# 用水碳排放系数 (kg CO2/m³)
water = 0.001

# 通勤方式碳排放系数 (kg CO2/km)
[transport]
步行 = 0.0
自行车 = 0.0
地铁 = 0.04
公交 = 0.089
私家车 = 0.192
电动车 = 0.053
出租车 = 0.192
网约车 = 0.192

[data]
# 数据文件路径
data_file = carbon_data.csv

# 显示设置
[display]
# 趋势分析默认显示天数
default_trend_days = 7

# 小数点位数
decimal_places = 3